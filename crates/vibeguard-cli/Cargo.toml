[package]
name = "vibeguard-cli"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
description = "VibeGuard local-first guardrail CLI"

[[bin]]
name = "vibeguard"
path = "src/bin/vibeguard.rs"

[[bin]]
name = "vbg"
path = "src/bin/vbg.rs"

[dependencies]
